name: npm publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter react-render-recorder build

      - run: npm publish --access public
        working-directory: packages/recorder
